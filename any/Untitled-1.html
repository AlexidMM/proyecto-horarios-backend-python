        // Función para formatear el campo 'start'
        function formatearStart(start) {
            const dias = { 'Lun': 'Lunes', 'Mar': 'Martes', 'Mie': 'Miércoles', 'Jue': 'Jueves', 'Vie': 'Viernes' };
            const dia = start.substring(0, 3);
            const hora = start.substring(3);
            return `${dias[dia] || 'Día desc.'} ${hora}:00`;
        }

        // Función para renderizar (dibujar) las filas de la tabla
        function renderizarTabla(datos) {
            const cuerpoTabla = document.getElementById('cuerpo-tabla');
            cuerpoTabla.innerHTML = '';

            datos.forEach(clase => {
                let fila = `<tr>
            <td><strong>${clase.group}</strong></td>
            <td>${formatearStart(clase.start)}</td>
            <td>${clase.subj}</td>
            <td>${clase.prof}</td>
            <td>${clase.room}</td>
        </tr>`;
                cuerpoTabla.innerHTML += fila;
            });
        }

        // Función principal para filtrar la tabla
        function filtrarTabla() {
            // Primero, obtenemos los datos ya ordenados
            const datosOrdenados = ordenarDatos();

            const filtroGrupo = document.getElementById('filtro-grupo').value.toLowerCase();
            const filtroMateria = document.getElementById('filtro-materia').value.toLowerCase();
            const filtroProfesor = document.getElementById('filtro-profesor').value.toLowerCase();
            const filtroSalon = document.getElementById('filtro-salon').value.toLowerCase();

            const datosFiltrados = datosOrdenados.filter(clase => {
                return clase.group.toLowerCase().includes(filtroGrupo) &&
                    clase.subj.toLowerCase().includes(filtroMateria) &&
                    clase.prof.toLowerCase().includes(filtroProfesor) &&
                    clase.room.toLowerCase().includes(filtroSalon);
            });

            renderizarTabla(datosFiltrados);
        }
